<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Diamond Shape</title>
    <style>
        /* General styles for the diamond container */
        .diamond-container {
            display: inline-block;
            padding: 10px;
            transform: rotate(45deg); /* Rotate to form a diamond */
            background-color: #fff;
            position: relative;
        }

        /* Flexible width and height based on content */
        .diamond-container::before {
            content: '';
            display: block;
            padding-top: 100%; /* Ensures the container stays square */
        }

        /* Text content inside the diamond */
        .diamond-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg); /* Rotate the text back */
            text-align: center;
            white-space: normal; /* Allows text wrapping */
            word-wrap: break-word; /* Breaks long words to fit inside */
            box-sizing: border-box;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="diamond-container">
        <div class="diamond-content">
            Here is a longer text that automatically resizes the diamond shape to fit all the contents inside.
        </div>
    </div>
</body>
</html>
